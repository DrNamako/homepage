<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Beloved Cat - 愛猫の紹介サイト</title>
  </head>
  <body>

    <header class="site-header" data-aos="fade-in">
      <p class="sub-title">My Companion</p>
      <h1 class="main-title">愛猫のいる暮らし</h1>
      <p class="lead-text">我が家の大切な家族を紹介します。日々の可愛い瞬間や、お気に入りの居場所をまとめました。</p>
    </header>

    <section class="section-container">
      <div class="swiper swiper-first" data-aos="fade-up">
        <img src="/public/Nao_1.jpg" alt="日当たりのいい特等席でお昼寝中">
        <div class="slide-title">かわいいお顔</div>
        <div class="swiper-wrapper">
          <div class="swiper-slide">🐱 甘えん坊で、撫でられるのが大好き</div>
          <div class="swiper-slide">🍖 ご飯の足音が聞こえると飛んできます</div>
          <div class="swiper-slide">📦 なぜかおもちゃより段ボールが一番好き</div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
      
      <div id="slide-counter" data-aos="fade-up" data-aos-delay="100">
        スライド1を表示しています。
      </div>
    </section>

    <section class="section-container">
      <h2 class="section-title" data-aos="fade-up">お気に入りの瞬間</h2>
      
      <div class="swiper swiper-second" data-aos="fade-up" data-aos-delay="100">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="https://picsum.photos/id/1025/600/300" alt="お気に入りの場所でウトウト">
            <div class="slide-title">日当たりのいい特等席でお昼寝中</div>
          </div>
          <div class="swiper-slide">
            <img src="https://picsum.photos/id/237/600/300" alt="おもちゃを見つめる目">
            <div class="slide-title">遊んでほしくてじっと見つめてくる瞬間</div>
          </div>
          <div class="swiper-slide">
            <img src="https://picsum.photos/id/1062/600/300" alt="のびのびリラックス">
            <div class="slide-title">お腹を見せてゴロゴロ、リラックスモード</div>
          </div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </section>

    <section class="section-container">
      <h2 class="section-title" data-aos="fade-up">猫友コミュニティ・メッセージ</h2>
      <p class="section-desc" data-aos="fade-up">猫好きさんからのメッセージや、うちの猫への感想をお待ちしています！</p>

      <form id="basic_form" novalidate data-aos="fade-up" data-aos-delay="100">
        <div class="form-group">
          <label for="basic_name"><span>お名前</span></label>
          <div class="input-container">
            <input id="basic_name" type="text" name="name" placeholder="お名前をフルネームで入力してください" />
          </div>
        </div>

        <div class="form-group">
          <label for="basic_email"><span>メールアドレス</span></label>
          <div class="input-container">
            <input id="basic_email" type="text" name="email" placeholder="example@domain.com" />
          </div>
        </div>

        <div class="form-group">
          <label for="basic_password"><span>パスワード設定</span></label>
          <div class="input-container">
            <input id="basic_password" type="password" name="password" placeholder="8文字以上（英数字を含む）" />
          </div>
        </div>

        <div class="form-group">
          <label for="basic_age"><span>あなたの猫歴（年）</span></label>
          <div class="input-container">
            <input id="basic_age" type="number" name="age" placeholder="猫との暮らしの長さを教えてください（18〜150）" />
          </div>
        </div>

        <div class="form-group">
          <label for="basic_address"><span>お住まいの地域</span></label>
          <div class="input-container">
            <input id="basic_address" type="text" name="address" placeholder="都道府県名など（例: 京都府）" />
          </div>
        </div>

        <button type="submit">メッセージを送信する</button>
      </form>
    </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
