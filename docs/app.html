<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Beloved Cat - 愛猫の紹介サイト</title>
  <script type="module" crossorigin src="/homepage/assets/app-CpFZY96s.js"></script>
  <link rel="modulepreload" crossorigin href="/homepage/assets/LogUtils-C2G5o1gm.js">
  <link rel="modulepreload" crossorigin href="/homepage/assets/browser-CN1TgfPy.js">
  <link rel="modulepreload" crossorigin href="/homepage/assets/OptionsUtils-CbmsA6vQ.js">
  <link rel="modulepreload" crossorigin href="/homepage/assets/browser-Ll6R2fkC.js">
  <link rel="stylesheet" crossorigin href="/homepage/assets/browser-IztYGC7q.css">
</head>

<body>

  <!-- 背景 -->
  <div id="tsparticles"></div>

  <!-- Header -->
  <header class="site-header" data-aos="fade-down">

    <p class="sub-title">My Companion</p>

    <h1 class="main-title">
      愛猫のいる暮らし
    </h1>

    <p class="lead-text">
      我が家の大切な家族を紹介します。<br>
      日々の可愛い瞬間をまとめました。
    </p>

  </header>


  <!-- 写真 -->
  <section class="section-container">

    <h2 class="section-title">
      愛猫ギャラリー
    </h2>
  
    <div class="swiper swiper-first">
  
      <div class="swiper-wrapper">
  
        <div class="swiper-slide" data-cat-name="Nao">
          <img src="/homepage/Nao_1.jpg" alt="Nao">
          <div class="slide-title">三毛猫なおなお</div>
        </div>
  
        <div class="swiper-slide" data-cat-name="Tyako">
          <img src="/homepage/tyako_2.jpg" alt="Tyako" class="cat-tyako">
          <div class="slide-title">チャトラのちゃこ</div>
        </div>
  
        <div class="swiper-slide" data-cat-name="Hana">
          <img src="/homepage/Hana_1.jpg" alt="Hana">
          <div class="slide-title">ぶち猫はなまる</div>
        </div>

        <div class="swiper-slide" data-cat-name="Sora">
          <img src="/homepage/masyu_1.jpg" alt="masyu">
          <div class="slide-title">白猫マシュ</div>
        </div>
  
      </div>
  
      <div class="swiper-pagination"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
  
    </div>
  
    <div id="slide-counter">
      Nao を表示しています
    </div>
  
  </section>


  <!-- 特徴 -->

  <section class="section-container">

    <h2 class="section-title">
      みんなのベストショット
    </h2>

    <div class="swiper swiper-second">

      <div class="swiper-wrapper">

        <div class="swiper-slide">
          <img src="/homepage/nao_2.jpg" alt="Nao">
          <div class="slide-title">ゆったりなおなお</div>
        </div>

        <div class="swiper-slide">
          <img src="/homepage/chako_2.jpg" alt="chako">
          <div class="slide-title">ちきまる</div>
        </div>

        <div class="swiper-slide">
          <img src="/homepage/hana_2.jpg" alt="chako">
          <div class="slide-title">えびみたいなはなちゃん</div>
        </div>

        <div class="swiper-slide">
          <img src="/homepage/masyu_2.jpg" alt="chako">
          <div class="slide-title">おりぼんましゅ</div>
        </div>

      </div>

      <div class="swiper-pagination"></div>

      <div class="swiper-button-prev"></div>

      <div class="swiper-button-next"></div>

    </div>

  </section>


  <!-- Form -->

  <section class="section-container">

    <h2 class="section-title">
      猫友コミュニティ
    </h2>

    <p class="section-desc">
      メッセージをお待ちしています。
    </p>

    <form id="basic_form">

      <div class="form-group">

        <label for="basic_name">お名前</label>

        <div class="input-container">
          <input id="basic_name" type="text">
        </div>

      </div>

      <div class="form-group">

        <label for="basic_email">メール</label>

        <div class="input-container">
          <input id="basic_email" type="text">
        </div>

      </div>

     

      <div class="form-group">

        <label for="basic_age">猫歴</label>

        <div class="input-container">
          <input id="basic_age" type="number">
        </div>

      </div>

      <div class="form-group">

        <label for="basic_address">お住まい</label>

        <div class="input-container">
          <input id="basic_address" type="text">
        </div>

      </div>

      <button type="submit">
        メッセージを送信する
      </button>

    </form>

  </section>

  

</body>

</html>
