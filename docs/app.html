<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>マル</title>
    <script type="module" crossorigin src="./assets/app-D0NUJ_f8.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/swiper-bundle-CplPcx3D.js">
    <link rel="stylesheet" crossorigin href="./assets/swiper-bundle-CZIYhIDe.css">
  </head>
  <body>

    <div class="swiper swiper-first">
      <div class="swiper-wrapper">
          <div class="swiper-slide">Slide 1</div>
          <div class="swiper-slide">Slide 2</div>
          <div class="swiper-slide">Slide 3</div>
      </div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
    
    <div id="slide-counter">スライ</div>

    <div class="swiper swiper-second">
      <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="https://picsum.photos/id/10/600/300" alt="森の景色">
            <div class="slide-title">美しい大自然の森</div>
          </div>
          <div class="swiper-slide">
            <img src="https://picsum.photos/id/29/600/300" alt="山の景色">
            <div class="slide-title">そびえ立つ雄大な山々</div>
          </div>
          <div class="swiper-slide">
            <img src="https://picsum.photos/id/43/600/300" alt="海の景色">
            <div class="slide-title">聳え立つビル群
      </div>
      <div class="swiper-pagination"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>

    <form id="basic_form" novalidate>
      <div class="form-group">
        <label for="basic_name"><span>名前</span></label>
        <div class="input-container">
          <input id="basic_name" type="text" name="name" placeholder="名前を入力してください。" />
        </div>
      </div>

      <div class="form-group">
        <label for="basic_email"><span>アドレス</span></label>
        <div class="input-container">
          <input id="basic_email" type="text" name="email" placeholder="メールアドレスを入力してください。" />
        </div>
      </div>

      <div class="form-group">
        <label for="basic_password"><span>パスワード</span></label>
        <div class="input-container">
          <input id="basic_password" type="password" name="password" placeholder="パスワードを入力してください。" />
        </div>
      </div>

      <div class="form-group">
        <label for="basic_age"><span>年齢</span></label>
        <div class="input-container">
          <input id="basic_age" type="number" name="age" placeholder="年齢を入力してください。" />
        </div>
      </div>

      <div class="form-group">
        <label for="basic_address"><span>住所</span></label>
        <div class="input-container">
          <input id="basic_address" type="text" name="address" placeholder="住所を入力してください。" />
        </div>
      </div>

      <button type="submit">送信</button>
    </form>
  </body>
</html>
